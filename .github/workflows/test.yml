name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Download goldlapel binary
        # Download the latest release asset from the private goldlapel/goldlapel
        # repo using the org-level RELEASE_TOKEN PAT (same token used by all
        # release-*.yml workflows). Org secret has visibility=ALL, so it
        # propagates to this public wrapper repo's workflow runs.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          LATEST=$(gh release list --repo goldlapel/goldlapel --limit 1 --json tagName -q '.[0].tagName')
          gh release download "$LATEST" --repo goldlapel/goldlapel --pattern "goldlapel-linux-x86_64" --dir /tmp
          chmod +x /tmp/goldlapel-linux-x86_64
          echo "GOLDLAPEL_BINARY=/tmp/goldlapel-linux-x86_64" >> $GITHUB_ENV

      - name: Run tests
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: bundle exec rake test
